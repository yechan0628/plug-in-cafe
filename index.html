<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlugIn Cafe - 실시간 콘센트 좌석 찾기</title>
    
    <!-- CSS Link -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Material Symbols for Premium Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        
        <!-- Left Sidebar: Search & Cafe List -->
        <aside class="sidebar">
            <div class="header">
                <div class="logo-container">
                    <span class="material-symbols-outlined logo-icon">bolt</span>
                    <h1 class="logo-text">PlugIn Cafe</h1>
                </div>
                
                <!-- Search bar -->
                <div class="search-box">
                    <span class="material-symbols-outlined search-icon">search</span>
                    <input type="text" id="search-input" placeholder="카페명 또는 주소를 입력하세요">
                </div>
                
                <!-- Filter Tags -->
                <div class="filter-tags">
                    <button class="filter-tag" id="filter-many-plugs">🔌 콘센트 많음</button>
                    <button class="filter-tag" id="filter-quiet">🍃 한적함</button>
                    <button class="filter-tag" id="filter-parking">🚗 주차가능</button>
                </div>
            </div>
            
            <!-- Cafe Cards List -->
            <div class="cafe-list" id="cafe-list">
                <!-- Javascript will render cards here -->
            </div>
        </aside>

        <!-- Right Content Area: Map & Sheet -->
        <main class="map-container">
            <!-- Custom Vector SVG Map representing a cozy street block -->
            <svg id="map-svg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
                <!-- Background Block -->
                <rect width="1000" height="700" fill="#EFEBE9" />
                
                <!-- River or Green Park representation -->
                <path d="M 0,0 L 0,150 Q 200,100 400,200 T 800,50 Q 900,0 1000,50 L 1000,0 Z" fill="#D7CCC8" opacity="0.4" />
                <rect x="50" y="50" width="120" height="80" rx="10" fill="#C8E6C9" opacity="0.5" /> <!-- Green Park -->
                <text x="110" y="95" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="600">센트럴 파크</text>
                
                <!-- Streets & Blocks -->
                <!-- Horizontal Street 1 -->
                <rect x="0" y="240" width="1000" height="50" fill="#D7CCC8" opacity="0.6" />
                <!-- Horizontal Street 2 -->
                <rect x="0" y="500" width="1000" height="60" fill="#D7CCC8" opacity="0.6" />
                <!-- Vertical Street 1 -->
                <rect x="360" y="0" width="60" height="700" fill="#D7CCC8" opacity="0.6" />
                <!-- Vertical Street 2 -->
                <rect x="800" y="0" width="50" height="700" fill="#D7CCC8" opacity="0.6" />
                
                <!-- Sub Street Grid Lines -->
                <line x1="0" y1="265" x2="1000" y2="265" stroke="#FFFFFF" stroke-dasharray="10 10" stroke-width="2" opacity="0.8" />
                <line x1="0" y1="530" x2="1000" y2="530" stroke="#FFFFFF" stroke-dasharray="10 10" stroke-width="2" opacity="0.8" />
                <line x1="390" y1="0" x2="390" y2="700" stroke="#FFFFFF" stroke-dasharray="10 10" stroke-width="2" opacity="0.8" />
                <line x1="825" y1="0" x2="825" y2="700" stroke="#FFFFFF" stroke-dasharray="10 10" stroke-width="2" opacity="0.8" />

                <!-- Map Buildings -->
                <rect x="100" y="320" width="180" height="100" rx="8" fill="#FFF" opacity="0.7" />
                <text x="190" y="375" text-anchor="middle" fill="#8D6E63" font-size="11" font-weight="500">아트 오피스 빌딩</text>
                
                <rect x="580" y="320" width="150" height="120" rx="8" fill="#FFF" opacity="0.7" />
                <text x="655" y="385" text-anchor="middle" fill="#8D6E63" font-size="11" font-weight="500">시네마 센터</text>
                
                <rect x="550" y="70" width="200" height="90" rx="8" fill="#FFF" opacity="0.7" />
                <text x="650" y="120" text-anchor="middle" fill="#8D6E63" font-size="11" font-weight="500">리버 쇼핑 몰</text>
                
                <!-- Pins are rendered in app.js -->
            </svg>

            <!-- Floating Simulation Control Console -->
            <div class="simulation-panel">
                <div class="sim-title">
                    <span class="material-symbols-outlined" style="color:var(--color-primary);">science</span>
                    <span>실시간 시뮬레이터</span>
                </div>
                
                <!-- Congestion Sim -->
                <div class="sim-control-group">
                    <span class="sim-control-label">현재 카페 혼잡도 조절</span>
                    <div class="sim-btn-row">
                        <button class="sim-btn" data-congestion="low">여유</button>
                        <button class="sim-btn" data-congestion="mid">보통</button>
                        <button class="sim-btn" data-congestion="high">혼잡</button>
                    </div>
                </div>
                
                <!-- Randomize Seats Sim -->
                <div class="sim-control-group">
                    <span class="sim-control-label">좌석 상태 제어</span>
                    <button class="action-btn" onclick="triggerRandomSimulation()">
                        <span class="material-symbols-outlined" style="font-size:16px;">shuffle</span>
                        전체 좌석 랜덤 갱신
                    </button>
                </div>
            </div>

            <!-- Slide-up Details Bottom Sheet -->
            <div class="bottom-sheet" id="bottom-sheet">
                <div class="sheet-handle" onclick="closeBottomSheet()"></div>
                <button class="close-sheet-btn" onclick="closeBottomSheet()">
                    <span class="material-symbols-outlined">close</span>
                </button>
                
                <div class="sheet-content" id="sheet-content">
                    <!-- Javascript will populate screen details here -->
                </div>
            </div>
        </main>
    </div>

    <!-- JS Link -->
    <script src="app.js"></script>
</body>
</html>
